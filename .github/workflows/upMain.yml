name: Run PySide6 App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Awla l-version li khedam biha

    - name: Install System Dependencies (For PySide6 & GUI)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libegl1-mesa libgl1-mesa-glx libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6
        # Ila 3endek dependencies khrin f requirements.txt,7iyed sdr li l-fo9 u dir hada:
        # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run App using XVFB (Virtual Display)
      run: |
        xvfb-run --server-args="-screen 0 1024x768x24" python main.py
